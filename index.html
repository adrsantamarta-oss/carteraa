<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Cartera"/>
<meta name="theme-color" content="#10131a"/>
<title>Cartera.Track</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#10131a;--card:#151a26;--card2:#1a2030;--border:#1e2a3a;--border2:#191f2e;
  --text:#e8f0f8;--text2:#d4e4f4;--muted:#8899bb;--dim:#5a7090;--dimmer:#3a4f65;
  --gold:#F4C542;--red:#E8714A;--green:#5BC4A0;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono','Courier New',monospace;}
body{display:flex;flex-direction:column;align-items:center;padding:28px 14px 80px;}
.wrap{width:100%;max-width:480px;}

.header{margin-bottom:22px;}
.header-title{display:flex;align-items:flex-end;gap:8px;}
.hw{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-1px;color:#fff;}
.hy{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--gold);}
.header-sub{font-size:10px;color:var(--dim);letter-spacing:2px;margin-top:3px;}

/* Tabs */
.tabs{display:flex;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:5px;margin-bottom:16px;}
.tab{flex:1;padding:9px 4px;border:none;border-radius:10px;font-family:inherit;font-size:12px;font-weight:800;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;background:none;color:var(--dim);}
.tab.active{background:var(--gold);color:#10131a;}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;margin-bottom:16px;overflow:hidden;}
.card-header{padding:13px 18px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.card-label{font-size:10px;letter-spacing:2px;color:var(--dim);}

/* Donut */
#donut-wrap{display:flex;flex-direction:column;align-items:center;padding:20px 12px 14px;}
#donut-svg{overflow:visible;}
.legend{width:100%;margin-top:14px;display:flex;flex-direction:column;gap:7px;}
.legend-row{display:flex;align-items:center;gap:10px;}
.legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.legend-name{flex:1;font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.legend-pct{font-size:12px;font-weight:600;min-width:50px;text-align:right;}
.legend-val{font-size:11px;color:var(--dim);min-width:78px;text-align:right;}

/* Asset rows */
.asset-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border2);transition:background 0.15s;cursor:default;}
.asset-row:last-child{border-bottom:none;}
.asset-row:hover{background:var(--card2);}
.asset-bar-col{width:8px;height:34px;border-radius:4px;flex-shrink:0;}
.asset-info{flex:1;min-width:0;}
.asset-name{font-size:13px;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.asset-value{font-size:11px;color:var(--dim);margin-top:2px;}
.asset-hint{font-size:9px;color:var(--dimmer);margin-left:5px;}
.edit-row{display:flex;gap:6px;margin-top:4px;}
.edit-input{background:#0d1018;border:1px solid var(--gold);border-radius:6px;color:#fff;padding:3px 8px;font-size:12px;width:100px;font-family:inherit;outline:none;}
.btn-sm{border:none;border-radius:5px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:600;}
.btn-confirm{background:var(--gold);color:var(--bg);}
.btn-cancel{background:transparent;border:1px solid #2d3f52;color:var(--muted);}
.pct-col{display:flex;flex-direction:column;align-items:flex-end;gap:4px;}
.pct-label{font-size:12px;font-weight:600;}
.pct-bar-bg{width:56px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.pct-bar-fill{height:100%;border-radius:2px;transition:width 0.5s cubic-bezier(.4,0,.2,1);}
.btn-del{background:none;border:none;color:var(--dimmer);cursor:pointer;font-size:15px;padding:4px 5px;border-radius:4px;line-height:1;transition:color 0.15s;}
.btn-del:hover{color:var(--red);}
.empty-msg{padding:26px 18px;text-align:center;color:#344050;font-size:12px;letter-spacing:1px;}

/* Add form */
.form-wrap{padding:16px;}
.form-row{display:flex;gap:8px;flex-wrap:wrap;}
.form-input{flex:2 1 130px;background:#0d1018;border:1px solid var(--border);border-radius:10px;color:var(--text2);padding:11px 13px;font-size:14px;font-family:inherit;outline:none;transition:border 0.2s;}
.form-input:focus{border-color:#F4C54255;}
.form-input.num{flex:1 1 85px;}
.btn-add{flex:0 0 auto;background:var(--gold);border:none;border-radius:10px;color:var(--bg);padding:11px 20px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.2s;letter-spacing:0.5px;}
.btn-add:hover{opacity:0.85;transform:scale(0.97);}

/* Total line */
.total-line{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-top:1px solid var(--border);font-size:12px;}
.total-val{color:var(--gold);font-weight:600;font-size:14px;}

/* ── CALCULADORA ── */
.calc-section{background:var(--card);border:1px solid var(--border);border-radius:20px;margin-bottom:16px;overflow:hidden;}
.calc-header{padding:13px 18px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.target-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border2);}
.target-row:last-child{border-bottom:none;}
.target-bar{width:8px;height:28px;border-radius:4px;flex-shrink:0;}
.target-info{flex:1;min-width:0;}
.target-name{font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.target-sub{font-size:10px;color:var(--dim);margin-top:2px;}
.target-input-wrap{display:flex;align-items:center;gap:4px;}
.target-input{background:#0d1018;border:1px solid var(--border);border-radius:8px;color:var(--text2);padding:6px 8px;font-size:12px;width:60px;font-family:inherit;outline:none;text-align:center;transition:border 0.2s;}
.target-input:focus{border-color:#F4C54255;}
.total-targets-row{display:flex;justify-content:space-between;align-items:center;padding:10px 18px;border-top:1px solid var(--border);font-size:11px;}

.contrib-wrap{padding:16px;}
.contrib-label{font-size:10px;letter-spacing:2px;color:var(--dim);margin-bottom:10px;}
.contrib-input{width:100%;background:#0d1018;border:1px solid #F4C54266;border-radius:10px;color:var(--gold);padding:13px 16px;font-size:18px;font-weight:700;font-family:inherit;outline:none;transition:border 0.2s;}
.contrib-input:focus{border-color:#F4C542;}
.contrib-warn{font-size:11px;color:var(--red);margin-top:8px;}

/* Results */
.result-row{padding:13px 16px;border-bottom:1px solid var(--border2);}
.result-row:last-child{border-bottom:none;}
.result-top{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.result-name{font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.result-change{font-size:10px;color:var(--dim);margin-top:1px;}
.result-amount{font-size:16px;font-weight:700;white-space:nowrap;}
.result-target{font-size:10px;color:var(--dim);}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.bar-label{font-size:9px;color:var(--dim);width:38px;letter-spacing:1px;}
.bar-bg{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;transition:width 0.5s;}
.bar-val{font-size:9px;width:32px;text-align:right;}
.result-summary{padding:12px 18px;border-top:1px solid var(--border);background:#0d1018;display:flex;flex-direction:column;gap:5px;}
.sum-row{display:flex;justify-content:space-between;font-size:11px;}

/* Notification */
#notif{position:fixed;top:16px;right:16px;z-index:999;background:#1e2a38;border:1px solid #2d3f52;color:var(--green);padding:10px 16px;border-radius:8px;font-size:12px;letter-spacing:1px;opacity:0;transform:translateY(-10px);transition:all 0.25s;pointer-events:none;}
#notif.show{opacity:1;transform:translateY(0);}

@media(max-width:400px){
  .form-input,.contrib-input{font-size:16px;}
  .legend-val{display:none;}
}
</style>
</head>
<body>
<div class="wrap">
<div id="notif"></div>

<div class="header">
  <div class="header-title"><span class="hw">CARTERA</span><span class="hy">.TRACK</span></div>
  <div class="header-sub">PORTFOLIO ALLOCATION TRACKER</div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-cartera" onclick="switchTab('cartera')">📊 Cartera</button>
  <button class="tab" id="tab-calc" onclick="switchTab('calc')">🧮 Calculadora</button>
</div>

<!-- ── CARTERA ── -->
<div id="panel-cartera">
  <div class="card" id="chart-card" style="display:none">
    <div id="donut-wrap">
      <svg id="donut-svg" width="210" height="210"></svg>
      <div class="legend" id="legend"></div>
    </div>
    <div class="total-line">
      <span class="card-label">TOTAL CARTERA</span>
      <span class="total-val" id="total-val">€0,00</span>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <span class="card-label">MIS ACTIVOS</span>
      <span class="card-label" id="count-label">0 posiciones</span>
    </div>
    <div id="asset-list"><div class="empty-msg">Añade tu primer activo abajo ↓</div></div>
  </div>

  <div class="card">
    <div class="form-wrap">
      <span class="card-label">AÑADIR ACTIVO</span>
      <div class="form-row" style="margin-top:12px;">
        <input class="form-input" id="inp-name" type="text" placeholder="Nombre del activo" autocomplete="off"/>
        <input class="form-input num" id="inp-val" type="number" min="0" step="any" placeholder="Valor €"/>
        <button class="btn-add" id="btn-add">+ Añadir</button>
      </div>
    </div>
  </div>
</div>

<!-- ── CALCULADORA ── -->
<div id="panel-calc" style="display:none">

  <!-- Targets -->
  <div class="calc-section">
    <div class="calc-header">
      <span class="card-label">% OBJETIVO POR FONDO</span>
      <button onclick="distributeEvenly()" style="background:none;border:1px solid #2a3a50;border-radius:6px;color:var(--dim);font-size:10px;cursor:pointer;padding:3px 8px;font-family:inherit;">Repartir igual</button>
    </div>
    <div id="targets-list"><div class="empty-msg">Añade activos en la pestaña Cartera</div></div>
    <div class="total-targets-row">
      <span style="color:var(--dim)">TOTAL OBJETIVO</span>
      <span id="total-targets-val" style="font-weight:700;font-size:13px;">0%</span>
    </div>
  </div>

  <!-- Contribution -->
  <div class="calc-section">
    <div class="contrib-wrap">
      <div class="contrib-label">¿CUÁNTO VAS A APORTAR?</div>
      <input class="contrib-input" id="contrib-input" type="number" min="0" step="any" placeholder="Importe total €" oninput="renderResults()"/>
      <div id="contrib-warn" style="display:none" class="contrib-warn">⚠ Los porcentajes objetivo deben sumar 100%</div>
    </div>
  </div>

  <!-- Results -->
  <div class="calc-section" id="results-card" style="display:none">
    <div class="calc-header">
      <span class="card-label" id="results-title">CÓMO REPARTIR</span>
    </div>
    <div id="results-list"></div>
    <div class="result-summary" id="results-summary"></div>
  </div>

</div>
</div>

<script>
const STORAGE_KEY = "cartera_assets_v2";
const TARGET_KEY = "cartera_targets_v2";
const COLORS = ["#F4C542","#E8714A","#5BC4A0","#5A9CF8","#C97BE8","#F47BB0","#4DD9E8","#A8E86B","#FF8C42","#7B8CF8"];

let assets = [];
let targets = {}; // { id: pct }
let editId = null;
let nextId = Date.now();
let currentTab = "cartera";
let nt;

function load() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) assets = JSON.parse(r); } catch(e) {}
  try { const r = localStorage.getItem(TARGET_KEY); if (r) targets = JSON.parse(r); } catch(e) {}
  if (!assets.length) {
    assets = [
      {id:1,name:"MSCI World ETF",value:8500},{id:2,name:"Bitcoin",value:3200},
      {id:3,name:"Apple Inc.",value:2100},{id:4,name:"Oro (ETC)",value:1400},{id:5,name:"Bonos EU",value:900}
    ];
    saveAssets();
  }
}
function saveAssets() { localStorage.setItem(STORAGE_KEY, JSON.stringify(assets)); }
function saveTargets() { localStorage.setItem(TARGET_KEY, JSON.stringify(targets)); }

function fmt(v) { return new Intl.NumberFormat("es-ES",{style:"currency",currency:"EUR",minimumFractionDigits:2}).format(v); }
function fmtPct(v,d=2) { return v.toFixed(d)+"%"; }
function notify(msg) {
  const el = document.getElementById("notif"); el.textContent = msg;
  el.classList.add("show"); clearTimeout(nt); nt = setTimeout(()=>el.classList.remove("show"),2000);
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById("panel-cartera").style.display = tab==="cartera"?"block":"none";
  document.getElementById("panel-calc").style.display = tab==="calc"?"block":"none";
  document.getElementById("tab-cartera").className = "tab"+(tab==="cartera"?" active":"");
  document.getElementById("tab-calc").className = "tab"+(tab==="calc"?" active":"");
  if (tab==="calc") renderCalc();
}

// ── DONUT ─────────────────────────────────────────────────
function drawDonut(segs) {
  const svg = document.getElementById("donut-svg");
  const cx=105,cy=105,r=78,ir=50;
  svg.innerHTML = "";
  let cum = 0;
  const sorted = [...segs].sort((a,b)=>b.pct-a.pct);
  const total = segs.reduce((a,s)=>a+s.value,0);

  sorted.forEach((seg,idx)=>{
    const s=cum; cum+=seg.pct/100; const e=cum;
    const sa=s*2*Math.PI-Math.PI/2, ea=e*2*Math.PI-Math.PI/2;
    const lg=seg.pct>50?1:0;
    const x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa);
    const x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
    const ix1=cx+ir*Math.cos(sa),iy1=cy+ir*Math.sin(sa);
    const ix2=cx+ir*Math.cos(ea),iy2=cy+ir*Math.sin(ea);
    const d=`M${x1},${y1} A${r},${r} 0 ${lg} 1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${lg} 0 ${ix1},${iy1} Z`;
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",d); path.setAttribute("fill",seg.color);
    path.style.cursor="pointer"; path.style.transition="all 0.2s";
    path.style.transformOrigin=`${cx}px ${cy}px`;
    path.addEventListener("mouseenter",()=>{
      updateCenter(seg.name,fmtPct(seg.pct),fmt(seg.value),seg.color);
      svg.querySelectorAll("path").forEach((p,i)=>p.style.opacity=i===idx?"1":"0.35");
      path.style.transform="scale(1.06)"; path.style.filter=`drop-shadow(0 0 8px ${seg.color}88)`;
    });
    path.addEventListener("mouseleave",()=>{
      updateCenter(null,null,null,null,fmt(total));
      svg.querySelectorAll("path").forEach(p=>{p.style.opacity="1";p.style.transform="scale(1)";p.style.filter="none";});
    });
    path.addEventListener("touchstart",(e)=>{e.preventDefault();updateCenter(seg.name,fmtPct(seg.pct),fmt(seg.value),seg.color);},{passive:false});
    svg.appendChild(path);
  });

  const circ=document.createElementNS("http://www.w3.org/2000/svg","circle");
  circ.setAttribute("cx",cx);circ.setAttribute("cy",cy);circ.setAttribute("r",ir-2);circ.setAttribute("fill","#10131a");
  svg.appendChild(circ);
  const g=document.createElementNS("http://www.w3.org/2000/svg","g");
  g.id="center-g"; svg.appendChild(g);
  updateCenter(null,null,null,null,fmt(total));
}

function mkText(x,y,txt,fill,size,weight){
  const t=document.createElementNS("http://www.w3.org/2000/svg","text");
  t.setAttribute("x",x);t.setAttribute("y",y);t.setAttribute("text-anchor","middle");
  t.setAttribute("fill",fill);t.setAttribute("font-size",size);
  t.setAttribute("font-family","'DM Mono',monospace");t.setAttribute("font-weight",weight||"400");
  t.textContent=txt; return t;
}

function updateCenter(name,pct,val,color,totalStr){
  const g=document.getElementById("center-g"); if(!g)return; g.innerHTML="";
  if(name){
    g.appendChild(mkText(105,95,name.length>13?name.slice(0,13)+"…":name,color,"11","600"));
    g.appendChild(mkText(105,113,pct,"#fff","16","700"));
    g.appendChild(mkText(105,130,val,"#8899aa","10","400"));
  } else {
    g.appendChild(mkText(105,100,"TOTAL","#aabbcc","10","400"));
    g.appendChild(mkText(105,117,totalStr||"€0,00","#fff","13","700"));
  }
}

// ── CARTERA RENDER ────────────────────────────────────────
function renderCartera() {
  const total = assets.reduce((a,x)=>a+x.value,0);
  const segs = assets.map((a,i)=>({...a,pct:total>0?(a.value/total)*100:0,color:COLORS[i%COLORS.length]}));

  const chartCard = document.getElementById("chart-card");
  if (assets.length>0) {
    chartCard.style.display="";
    drawDonut(segs);
    const leg=document.getElementById("legend"); leg.innerHTML="";
    [...segs].sort((a,b)=>b.pct-a.pct).forEach(s=>{
      const row=document.createElement("div"); row.className="legend-row";
      row.innerHTML=`<div class="legend-dot" style="background:${s.color}"></div><div class="legend-name">${s.name}</div><div class="legend-pct" style="color:${s.color}">${fmtPct(s.pct)}</div><div class="legend-val">${fmt(s.value)}</div>`;
      leg.appendChild(row);
    });
    document.getElementById("total-val").textContent=fmt(total);
  } else { chartCard.style.display="none"; }

  const list=document.getElementById("asset-list");
  document.getElementById("count-label").textContent=`${assets.length} posicion${assets.length!==1?"es":""}`;
  if(!assets.length){list.innerHTML='<div class="empty-msg">Añade tu primer activo abajo ↓</div>';return;}
  list.innerHTML="";
  segs.forEach(s=>{
    const isE=editId===s.id;
    const row=document.createElement("div"); row.className="asset-row";
    row.innerHTML=`
      <div class="asset-bar-col" style="background:${s.color}"></div>
      <div class="asset-info">
        <div class="asset-name">${s.name}</div>
        ${isE?`<div class="edit-row"><input class="edit-input" id="edit-inp" type="number" value="${s.value}" min="0" step="any"/><button class="btn-sm btn-confirm" onclick="saveEdit(${s.id})">✓</button><button class="btn-sm btn-cancel" onclick="cancelEdit()">✕</button></div>`:`<div class="asset-value">${fmt(s.value)}<span class="asset-hint">doble clic p/ editar</span></div>`}
      </div>
      <div class="pct-col">
        <span class="pct-label" style="color:${s.color}">${fmtPct(s.pct)}</span>
        <div class="pct-bar-bg"><div class="pct-bar-fill" style="width:${s.pct}%;background:${s.color}"></div></div>
      </div>
      <button class="btn-del" onclick="removeAsset(${s.id})">✕</button>`;
    if(!isE) row.querySelector(".asset-value").addEventListener("dblclick",()=>startEdit(s.id));
    else setTimeout(()=>{const inp=document.getElementById("edit-inp");if(inp){inp.focus();inp.select();}},30);
    list.appendChild(row);
  });
}

function startEdit(id){editId=id;renderCartera();}
function cancelEdit(){editId=null;renderCartera();}
function saveEdit(id){
  const inp=document.getElementById("edit-inp");
  const val=parseFloat(inp?.value);
  if(!isNaN(val)&&val>0){assets=assets.map(a=>a.id===id?{...a,value:val}:a);saveAssets();notify("Valor actualizado ✓");}
  editId=null;renderCartera();
  if(currentTab==="calc")renderCalc();
}
function removeAsset(id){assets=assets.filter(a=>a.id!==id);saveAssets();notify("Activo eliminado");renderCartera();if(currentTab==="calc")renderCalc();}

document.getElementById("btn-add").addEventListener("click",addAsset);
document.getElementById("inp-val").addEventListener("keydown",e=>{if(e.key==="Enter")addAsset();});
document.getElementById("inp-name").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("inp-val").focus();});

function addAsset(){
  const name=document.getElementById("inp-name").value.trim();
  const val=parseFloat(document.getElementById("inp-val").value);
  if(!name||isNaN(val)||val<=0){notify("Rellena nombre y valor");return;}
  assets.push({id:nextId++,name,value:val});
  saveAssets();
  document.getElementById("inp-name").value="";
  document.getElementById("inp-val").value="";
  document.getElementById("inp-name").focus();
  notify("Activo añadido ✓");
  renderCartera();
}

// ── CALCULADORA ──────────────────────────────────────────
function ensureTargets(){
  assets.forEach(a=>{ if(targets[a.id]===undefined) targets[a.id]=(100/assets.length).toFixed(1); });
  Object.keys(targets).forEach(id=>{ if(!assets.find(a=>a.id==id)) delete targets[id]; });
}

function distributeEvenly(){
  const eq=(100/assets.length).toFixed(1);
  assets.forEach(a=>targets[a.id]=eq);
  saveTargets();renderCalc();
}

function totalTargetPct(){
  return Object.values(targets).reduce((a,v)=>a+(parseFloat(v)||0),0);
}

function renderCalc(){
  ensureTargets();
  const total=assets.reduce((a,x)=>a+x.value,0);

  if(!assets.length){
    document.getElementById("targets-list").innerHTML='<div class="empty-msg">Añade activos en la pestaña Cartera</div>';
    document.getElementById("total-targets-val").textContent="0%";
    return;
  }

  const tlist=document.getElementById("targets-list"); tlist.innerHTML="";
  assets.forEach((a,i)=>{
    const color=COLORS[i%COLORS.length];
    const currentPct=total>0?(a.value/total)*100:0;
    const row=document.createElement("div"); row.className="target-row";
    row.innerHTML=`
      <div class="target-bar" style="background:${color}"></div>
      <div class="target-info">
        <div class="target-name">${a.name}</div>
        <div class="target-sub">Ahora: ${fmtPct(currentPct,1)} · ${fmt(a.value)}</div>
      </div>
      <div class="target-input-wrap">
        <input class="target-input" id="t-${a.id}" type="number" min="0" max="100" step="0.1" value="${targets[a.id]||0}" style="color:${color};border-color:${color}55" oninput="onTargetChange(${a.id},this.value)"/>
        <span style="font-size:11px;color:var(--dim)">%</span>
      </div>`;
    tlist.appendChild(row);
  });

  const ttl=totalTargetPct();
  const isValid=Math.abs(ttl-100)<0.15;
  const ttlEl=document.getElementById("total-targets-val");
  ttlEl.textContent=`${ttl.toFixed(1)}% ${isValid?"✓":`← falta ${(100-ttl).toFixed(1)}%`}`;
  ttlEl.style.color=isValid?"#5BC4A0":"#E8714A";

  renderResults();
}

function onTargetChange(id,val){
  targets[id]=val; saveTargets();
  const ttl=totalTargetPct();
  const isValid=Math.abs(ttl-100)<0.15;
  const ttlEl=document.getElementById("total-targets-val");
  ttlEl.textContent=`${ttl.toFixed(1)}% ${isValid?"✓":`← falta ${(100-ttl).toFixed(1)}%`}`;
  ttlEl.style.color=isValid?"#5BC4A0":"#E8714A";
  renderResults();
}

function renderResults(){
  const contrib=parseFloat(document.getElementById("contrib-input")?.value);
  const isValid=Math.abs(totalTargetPct()-100)<0.15;
  const warn=document.getElementById("contrib-warn");
  const card=document.getElementById("results-card");

  if(contrib>0&&!isValid){warn.style.display="block";}else{warn.style.display="none";}
  if(!contrib||contrib<=0||!isValid){card.style.display="none";return;}

  card.style.display="";
  document.getElementById("results-title").textContent=`CÓMO REPARTIR ${fmt(contrib)}`;

  const total=assets.reduce((a,x)=>a+x.value,0);
  const newTotal=total+contrib;

  // Smart allocation: fill most underweight first
  let remaining=contrib;
  const allocs=assets.map((a,i)=>{
    const targetPct=parseFloat(targets[a.id])||0;
    const targetVal=(targetPct/100)*newTotal;
    const needed=Math.max(0,targetVal-a.value);
    const currentPct=total>0?(a.value/total)*100:0;
    return{...a,color:COLORS[i%COLORS.length],targetPct,needed,currentPct};
  });
  const sorted=[...allocs].sort((a,b)=>(a.currentPct-a.targetPct)-(b.currentPct-b.targetPct));
  const toAdd={};
  allocs.forEach(a=>toAdd[a.id]=0);
  for(const asset of sorted){
    const give=Math.min(asset.needed,remaining);
    toAdd[asset.id]=give; remaining-=give;
    if(remaining<=0.01)break;
  }
  if(remaining>0.01){
    const tTotal=allocs.reduce((a,x)=>a+x.targetPct,0);
    allocs.forEach(a=>{toAdd[a.id]+=(a.targetPct/tTotal)*remaining;});
  }

  const results=allocs.map(a=>{
    const add=toAdd[a.id];
    const newValue=a.value+add;
    const newPct=(newValue/newTotal)*100;
    return{...a,toAdd:add,newValue,newPct};
  });

  const rlist=document.getElementById("results-list"); rlist.innerHTML="";
  results.forEach(r=>{
    const isZero=r.toAdd<0.01;
    const diff=r.newPct-r.currentPct;
    const row=document.createElement("div"); row.className="result-row";
    row.innerHTML=`
      <div class="result-top">
        <div class="asset-bar-col" style="background:${r.color};height:32px;width:8px;border-radius:4px;flex-shrink:0"></div>
        <div style="flex:1;min-width:0">
          <div class="result-name">${r.name}</div>
          <div class="result-change">${fmtPct(r.currentPct,1)} → ${fmtPct(r.newPct,1)} <span style="color:${diff>=0?"#5BC4A0":"#E8714A"}">(${diff>=0?"+":""}${diff.toFixed(1)}%)</span></div>
        </div>
        <div style="text-align:right">
          <div class="result-amount" style="color:${isZero?"var(--dim)":r.color}">${isZero?"—":fmt(r.toAdd)}</div>
          <div class="result-target">obj: ${fmtPct(r.targetPct,1)}</div>
        </div>
      </div>
      <div class="bar-row"><span class="bar-label">ANTES</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(r.currentPct,100)}%;background:${r.color};opacity:0.4"></div></div><span class="bar-val" style="color:var(--dim)">${fmtPct(r.currentPct,1)}</span></div>
      <div class="bar-row"><span class="bar-label">DESPUÉS</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(r.newPct,100)}%;background:${r.color}"></div></div><span class="bar-val" style="color:${r.color};font-weight:700">${fmtPct(r.newPct,1)}</span></div>
      <div class="bar-row"><span class="bar-label">OBJETIVO</span><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(r.targetPct,100)}%;background:#F4C542;opacity:0.35"></div></div><span class="bar-val" style="color:#F4C542">${fmtPct(r.targetPct,1)}</span></div>`;
    rlist.appendChild(row);
  });

  document.getElementById("results-summary").innerHTML=`
    <div class="sum-row"><span style="color:var(--dim)">TOTAL APORTADO</span><span style="color:var(--gold);font-weight:700">${fmt(contrib)}</span></div>
    <div class="sum-row"><span style="color:var(--dim)">NUEVA CARTERA TOTAL</span><span style="color:#5BC4A0;font-weight:700">${fmt(newTotal)}</span></div>`;
}

load();renderCartera();
</script>
</body>
</html>
